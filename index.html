<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arijit Singh &mdash; Blue Hour Ballads</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background:
      radial-gradient(circle at top, #112047 0%, #081225 34%, #040710 62%, #010207 100%);
    overflow: hidden;
    font-family: "DM Sans", sans-serif;
  }

  a { color: inherit; }

  #header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    padding: 28px 40px 0;
    z-index: 10;
    pointer-events: none;
  }

  #byline {
    position: fixed;
    top: 28px;
    right: 40px;
    z-index: 10;
    pointer-events: none;
    text-align: right;
  }

  #byline span {
    color: #8d96ab;
    font-size: 9px;
    letter-spacing: 1px;
  }

  .eyebrow {
    color: #8eb8ff;
    font-size: 9px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-family: "Libre Baskerville", serif;
    font-size: clamp(16px, 2.5vw, 30px);
    font-weight: 400;
    font-style: italic;
    color: #f3eee6;
    margin-bottom: 4px;
  }

  .sub {
    color: #4e5c78;
    font-size: 10px;
  }

  #legend {
    position: fixed;
    bottom: 48px;
    left: 40px;
    display: flex;
    gap: 20px;
    z-index: 10;
    flex-wrap: wrap;
  }

  .leg {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    transition: background 0.15s;
  }

  .leg:hover { background: rgba(255,255,255,0.05); }
  .leg.active .leg-label { color: #f3eee6; }

  .leg-line {
    width: 20px;
    height: 1.5px;
  }

  .leg-label {
    color: #aeb5c4;
    font-size: 9px;
    letter-spacing: 1px;
    transition: color 0.15s;
  }

  #credits {
    position: fixed;
    bottom: 24px;
    left: 40px;
    z-index: 10;
    pointer-events: none;
    font-size: 8px;
    color: #7e889e;
    letter-spacing: 0.5px;
  }

  #card {
    position: fixed;
    right: 40px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(6, 10, 22, 0.96);
    border: 1px solid #18233d;
    border-radius: 8px;
    padding: 20px 24px;
    width: 240px;
    display: none;
    z-index: 20;
    transition: opacity 0.15s;
    box-shadow: 0 16px 48px rgba(0, 0, 0, 0.28);
  }

  .card-year {
    color: #8eb8ff;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .card-title {
    font-size: 14px;
    font-weight: 500;
    color: #f3eee6;
    line-height: 1.4;
    margin-bottom: 4px;
  }

  .card-meta {
    color: #7382a1;
    font-size: 11px;
    margin-bottom: 16px;
  }

  .card-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .stat-val {
    font-size: 18px;
    font-weight: 500;
    color: #f3eee6;
  }

  .stat-label {
    font-size: 8px;
    color: #50607e;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 1px;
  }

  .card-mood {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid #18233d;
    font-size: 10px;
    color: #50607e;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .mood-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  canvas {
    display: block;
    touch-action: none;
  }

  @media (max-width: 768px) {
    #header { padding: 20px 20px 0; }
    #byline { top: 20px; right: 20px; }
    #legend { left: 20px; bottom: 56px; gap: 10px; }
    #credits { left: 20px; bottom: 24px; }
    #card {
      right: 0;
      left: 0;
      top: auto;
      bottom: 0;
      transform: none;
      width: 100%;
      border-radius: 12px 12px 0 0;
      border-left: none;
      border-right: none;
      border-bottom: none;
      padding: 16px 20px 32px;
    }
    .card-stats { grid-template-columns: repeat(4, 1fr); }
    .stat-val { font-size: 14px; }
  }
</style>
</head>
<body>

<div id="byline"><span>Ritesh made it, i made it</span></div>

<div id="header">
  <div class="eyebrow">Arijit Singh &middot;</div>
  <h1>Blue Hour Ballads</h1>
  <p class="sub" id="subtitle">Loading songs&hellip;</p>
</div>

<div id="legend">
  <div class="leg active" data-filter="all"><div class="leg-line" style="background:#6e7a92;"></div><span class="leg-label">all</span></div>
  <div class="leg" data-filter="euphoric"><div class="leg-line" style="background:#f3c86a;"></div><span class="leg-label">euphoric</span></div>
  <div class="leg" data-filter="intense"><div class="leg-line" style="background:#ff7d74;"></div><span class="leg-label">intense</span></div>
  <div class="leg" data-filter="melancholic"><div class="leg-line" style="background:#7aa7e3;"></div><span class="leg-label">melancholic</span></div>
</div>

<div id="credits">data: iTunes catalog + preview analysis &middot; public YouTube search views</div>

<div id="card">
  <div class="card-year" id="c-year"></div>
  <div class="card-title" id="c-title"></div>
  <div class="card-meta" id="c-meta"></div>
  <div class="card-stats">
    <div><div class="stat-val" id="c-bpm"></div><div class="stat-label">BPM</div></div>
    <div><div class="stat-val" id="c-energy"></div><div class="stat-label">Energy</div></div>
    <div><div class="stat-val" id="c-valence"></div><div class="stat-label">Mood</div></div>
    <div><div class="stat-val" id="c-dance"></div><div class="stat-label">Dance</div></div>
  </div>
  <div class="card-mood">
    <div class="mood-dot" id="c-dot"></div>
    <span id="c-mood-label"></span>
  </div>
</div>

<canvas id="cv"></canvas>

<script src="songs-data.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.12.17/paper-full.min.js"></script>
<script type="text/paperscript" canvas="cv">

var songs = (window.ARIJIT_SONGS || []).slice();

songs.sort(function(a, b) {
  if (a.tempo === null) return 1;
  if (b.tempo === null) return -1;
  return b.tempo - a.tempo;
});

var n = songs.length;
var W = 0;
var H = 0;
var padTop = 100;
var padBottom = 50;
var usableH = 0;
var slotH = 0;
var maxViews = 1;
var paths = [];
var phases = [];
var hoveredIdx = -1;
var t = 0;
var POINTS = 12;

function syncMetrics() {
  W = view.size.width;
  H = view.size.height;
  usableH = H - padTop - padBottom;
  slotH = usableH / n;
}

for (var i = 0; i < songs.length; i++) {
  if (songs[i].views > maxViews) maxViews = songs[i].views;
}

function bpmColor(index, total, alpha) {
  var stops = [
    [0xF3/255, 0xC8/255, 0x6A/255],
    [0x8E/255, 0xB8/255, 0xFF/255],
    [0xFF/255, 0x7D/255, 0x74/255],
    [0x84/255, 0xB8/255, 0xC6/255],
    [0x7A/255, 0xA7/255, 0xE3/255]
  ];
  var t = index / (total - 1);
  var scaled = t * (stops.length - 1);
  var idx = Math.floor(scaled);
  var f = scaled - idx;
  if (idx >= stops.length - 1) {
    return new Color(stops[stops.length - 1][0], stops[stops.length - 1][1], stops[stops.length - 1][2], alpha);
  }
  var r = stops[idx][0] + f * (stops[idx + 1][0] - stops[idx][0]);
  var g = stops[idx][1] + f * (stops[idx + 1][1] - stops[idx][1]);
  var b = stops[idx][2] + f * (stops[idx + 1][2] - stops[idx][2]);
  return new Color(r, g, b, alpha);
}

function getMoodCategory(v) {
  if (v === null) return "none";
  if (v >= 0.75) return "euphoric";
  if (v <= 0.5) return "melancholic";
  return "intense";
}

function baseYForIndex(index) {
  return padTop + (index + 0.5) * slotH;
}

function buildPaths() {
  syncMetrics();
  for (var i = 0; i < n; i++) {
    var s = songs[i];
    var baseY = baseYForIndex(i);
    var thickness = 0.45 + (s.views / maxViews) * 4.1;
    var alpha = 0.42 + (s.views / maxViews) * 0.42;
    var path = new Path({
      strokeColor: bpmColor(i, n, alpha),
      strokeWidth: thickness,
      strokeCap: "round",
      strokeJoin: "round"
    });

    for (var j = 0; j <= POINTS; j++) {
      path.add(new Point(j * W / POINTS, baseY));
    }

    path.smooth();
    paths.push(path);
    phases.push(Math.random() * Math.PI * 2);
  }
}

buildPaths();

view.onFrame = function() {
  t += 0.4;
  syncMetrics();

  for (var i = 0; i < n; i++) {
    var s = songs[i];
    var path = paths[i];
    var baseY = baseYForIndex(i);
    var tempo = s.tempo || 80;
    var energy = s.energy || 0.1;
    var freq = (tempo / 120) * 0.055;
    var amp = energy * slotH * 1.7;
    var phase = phases[i];
    var isHovered = i === hoveredIdx;

    for (var j = 0; j <= POINTS; j++) {
      var x = j * W / POINTS;
      var y = baseY + amp * Math.sin(freq * t + j * 0.9 + phase);
      path.segments[j].point = new Point(x, y);
    }

    path.smooth();

    var mood = getMoodCategory(s.valence);
    var currentFilter = (typeof window !== "undefined" && window.paperActiveFilter) ? window.paperActiveFilter : "all";
    var inFilter = currentFilter === "all" || mood === currentFilter;
    var baseWidth = 0.45 + (s.views / maxViews) * 4.1;

    if (hoveredIdx >= 0) {
      path.opacity = isHovered ? 1 : 0.04;
      path.strokeWidth = isHovered ? baseWidth + 1.5 : baseWidth;
    } else if (!inFilter) {
      path.opacity = 0.03;
      path.strokeWidth = baseWidth;
    } else {
      path.opacity = 0.42 + (s.views / maxViews) * 0.42;
      path.strokeWidth = baseWidth;
    }
  }
};

view.onMouseMove = function(event) {
  var my = event.point.y;
  var closest = -1;
  var minDist = slotH * 1.2;

  for (var i = 0; i < n; i++) {
    var dist = Math.abs(my - baseYForIndex(i));
    if (dist < minDist) {
      minDist = dist;
      closest = i;
    }
  }

  if (closest !== hoveredIdx) {
    hoveredIdx = closest;
    if (closest >= 0) showCard(songs[closest]);
    else hideCard();
  }
};

view.onMouseLeave = function() {
  hoveredIdx = -1;
  hideCard();
};

view.onResize = function() {
  syncMetrics();
};

view.on("touchmove", function(event) {
  event.preventDefault();
  var touch = event.event.touches[0];
  var rect = view.element.getBoundingClientRect();
  var my = (touch.clientY - rect.top) * (view.size.height / rect.height);
  var closest = -1;
  var minDist = slotH * 2.5;

  for (var i = 0; i < n; i++) {
    var dist = Math.abs(my - baseYForIndex(i));
    if (dist < minDist) {
      minDist = dist;
      closest = i;
    }
  }

  if (closest !== hoveredIdx) {
    hoveredIdx = closest;
    if (closest >= 0) showCard(songs[closest]);
    else hideCard();
  }
});

view.on("touchend", function() {
  hoveredIdx = -1;
  hideCard();
});

function showCard(s) {
  var card = document.getElementById("card");
  document.getElementById("c-year").textContent = s.year;
  document.getElementById("c-title").textContent = s.title;
  document.getElementById("c-meta").textContent = formatViews(s.views) + " YouTube views";
  document.getElementById("c-bpm").textContent = s.tempo ? Math.round(s.tempo) : "-";
  document.getElementById("c-energy").textContent = s.energy ? Math.round(s.energy * 100) + "%" : "-";
  document.getElementById("c-valence").textContent = s.valence ? Math.round(s.valence * 100) + "%" : "-";
  document.getElementById("c-dance").textContent = s.dance ? Math.round(s.dance * 100) + "%" : "-";

  var dot = document.getElementById("c-dot");
  var label = document.getElementById("c-mood-label");

  if (s.valence === null) {
    dot.style.background = "#2a3244";
    label.textContent = "no audio data";
    label.style.color = "#50607e";
  } else if (s.valence >= 0.75) {
    dot.style.background = "#f3c86a";
    label.textContent = "euphoric";
    label.style.color = "#f3c86a";
  } else if (s.valence <= 0.5) {
    dot.style.background = "#7aa7e3";
    label.textContent = "melancholic";
    label.style.color = "#7aa7e3";
  } else {
    dot.style.background = "#ff7d74";
    label.textContent = "intense";
    label.style.color = "#ff7d74";
  }

  card.style.display = "block";
}

function hideCard() {
  document.getElementById("card").style.display = "none";
}

function formatViews(views) {
  if (views >= 1e9) return (views / 1e9).toFixed(2).replace(/\.00$/, "") + "B";
  if (views >= 1e6) return (views / 1e6).toFixed(1).replace(/\.0$/, "") + "M";
  if (views >= 1e3) return (views / 1e3).toFixed(1).replace(/\.0$/, "") + "K";
  return String(views);
}

view.viewSize = new Size(window.innerWidth, window.innerHeight);

</script>

<script>
  document.getElementById("subtitle").textContent = (window.ARIJIT_SONGS || []).length + " songs · stacked by BPM · hover to explore";

  function syncCanvasSize() {
    var canvas = document.getElementById("cv");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    if (window.paper && paper.view) {
      paper.view.viewSize = new paper.Size(window.innerWidth, window.innerHeight);
    }
  }

  window.addEventListener("resize", syncCanvasSize);
  syncCanvasSize();

  function applyLegendState(filter) {
    document.querySelectorAll(".leg").forEach(function(item) {
      item.classList.remove("active");
    });

    var target = filter === "all" ? document.querySelector('[data-filter="all"]') : document.querySelector('[data-filter="' + filter + '"]');
    if (target) target.classList.add("active");
  }

  document.querySelectorAll(".leg").forEach(function(el) {
    el.addEventListener("click", function() {
      var filter = el.getAttribute("data-filter");
      if (window._activeFilter === filter && filter !== "all") {
        window._activeFilter = "all";
      } else {
        window._activeFilter = filter;
      }

      window.paperActiveFilter = window._activeFilter;
      applyLegendState(window._activeFilter);
    });
  });

  window._activeFilter = "all";
  window.paperActiveFilter = "all";
  applyLegendState("all");
</script>
</body>
</html>
